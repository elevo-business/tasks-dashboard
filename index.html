<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paperclip – Aufgaben</title>
  <style>
    :root {
      --bg: #0f0f10;
      --surface: #1a1a1d;
      --border: #2a2a2e;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e8e8ea;
      --muted: #888;
      --red: #ef4444;
      --yellow: #f59e0b;
      --green: #22c55e;
      --blue: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100dvh; }

    /* ─── Login ─── */
    #login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100dvh; padding: 24px; gap: 20px;
    }
    #login-screen h1 { font-size: 1.5rem; font-weight: 700; }
    #login-screen p { color: var(--muted); font-size: 0.9rem; text-align: center; max-width: 320px; }
    .input-group { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    input[type="text"], input[type="password"], textarea, select {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 12px 14px; font-size: 1rem; width: 100%;
      outline: none; transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }

    /* ─── Buttons ─── */
    .btn {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 13px 20px; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; width: 100%; max-width: 360px;
    }
    .btn:active { opacity: 0.7; }
    .btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn.danger { background: var(--red); }
    .btn.sm { padding: 8px 14px; font-size: 0.85rem; width: auto; max-width: none; border-radius: 8px; }

    /* ─── App Shell ─── */
    #app { display: none; flex-direction: column; min-height: 100dvh; }

    /* Top Bar */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h2 { font-size: 1.1rem; font-weight: 700; }
    .topbar-actions { display: flex; gap: 8px; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1; padding: 12px 4px 10px; display: flex; flex-direction: column;
      align-items: center; gap: 3px; border: none; background: none; color: var(--muted);
      font-size: 0.65rem; cursor: pointer; transition: color 0.15s;
    }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .nav-btn.active { color: var(--accent2); }

    /* ─── Main Content ─── */
    .content { flex: 1; padding: 16px; padding-bottom: 80px; }

    /* Views */
    .view { display: none; }
    .view.active { display: block; }

    /* ─── Cards ─── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .card:active { border-color: var(--accent); }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-title { font-size: 0.95rem; font-weight: 600; line-height: 1.35; flex: 1; }
    .card-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
    .badge {
      font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .badge.in_progress { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge.todo { background: rgba(156,163,175,0.15); color: #9ca3af; }
    .badge.blocked { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge.in_review { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge.done { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge.high { background: rgba(239,68,68,0.1); color: #f87171; }
    .badge.critical { background: rgba(239,68,68,0.2); color: var(--red); }
    .badge.medium { background: rgba(245,158,11,0.1); color: #fbbf24; }
    .badge.low { background: rgba(107,114,128,0.1); color: var(--muted); }

    .identifier { font-size: 0.75rem; color: var(--muted); }

    /* ─── Task Detail ─── */
    .detail-back { display: flex; align-items: center; gap: 6px; color: var(--accent2); font-size: 0.9rem; margin-bottom: 16px; cursor: pointer; }
    .detail-back svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .detail-title { font-size: 1.15rem; font-weight: 700; line-height: 1.4; margin-bottom: 12px; }
    .detail-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .detail-desc { font-size: 0.875rem; color: #c0c0c8; line-height: 1.6; white-space: pre-wrap; background: var(--surface); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; }
    .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 8px; }
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .action-grid .btn { max-width: none; padding: 11px; font-size: 0.85rem; }
    .comment-item { background: var(--surface); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; font-size: 0.85rem; }
    .comment-author { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
    .comment-body { line-height: 1.5; color: #d0d0d8; }

    /* ─── Loading / Error ─── */
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
    .error-msg { background: rgba(239,68,68,0.1); color: #f87171; border-radius: 10px; padding: 12px 14px; font-size: 0.875rem; margin-bottom: 12px; }

    /* ─── Settings ─── */
    .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 0.95rem; }
    .settings-val { font-size: 0.8rem; color: var(--muted); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Pull-to-refresh indicator */
    .refresh-hint { text-align: center; color: var(--muted); font-size: 0.75rem; padding: 8px 0; }
  </style>
</head>
<body>

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div id="login-screen">
  <div style="font-size: 2rem;">📎</div>
  <h1>Paperclip Mobile</h1>
  <p>Gib deinen API-Key und die Paperclip-URL ein, um deine Aufgaben zu verwalten.</p>

  <div class="input-group">
    <label>Paperclip API-URL</label>
    <input type="text" id="api-url-input" placeholder="https://app.paperclip.ing" />
  </div>
  <div class="input-group">
    <label>API-Key</label>
    <input type="password" id="api-key-input" placeholder="Bearer Token…" />
  </div>
  <div id="login-error" class="error-msg" style="display:none; max-width:360px; width:100%;"></div>
  <button class="btn" onclick="doLogin()">Anmelden</button>
  <p style="font-size:0.75rem; color:var(--muted); max-width:280px; text-align:center;">
    Den API-Key findest du in den Paperclip-Einstellungen unter "API-Schlüssel". Er wird lokal in deinem Browser gespeichert.
  </p>
</div>

<!-- ═══════════════════ APP ═══════════════════ -->
<div id="app">

  <!-- Top Bar -->
  <div class="topbar">
    <h2 id="topbar-title">Aufgaben</h2>
    <div class="topbar-actions">
      <button class="btn sm secondary" onclick="refreshCurrent()" title="Aktualisieren">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Inbox View -->
    <div id="view-inbox" class="view active">
      <div id="inbox-list"><div class="spinner"></div></div>
    </div>

    <!-- All Tasks View -->
    <div id="view-tasks" class="view">
      <div style="display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;">
        <select id="filter-status" onchange="loadTasks()" style="flex:1; min-width:120px;">
          <option value="todo,in_progress,in_review,blocked">Aktiv</option>
          <option value="in_progress">In Arbeit</option>
          <option value="in_review">In Review</option>
          <option value="todo">Todo</option>
          <option value="blocked">Blockiert</option>
          <option value="done">Erledigt</option>
        </select>
      </div>
      <div id="tasks-list"><div class="spinner"></div></div>
    </div>

    <!-- Task Detail View -->
    <div id="view-detail" class="view">
      <div class="detail-back" onclick="goBack()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
        Zurück
      </div>
      <div id="detail-content"></div>
    </div>

    <!-- Settings View -->
    <div id="view-settings" class="view">
      <div class="card" style="cursor:default;">
        <div class="settings-row">
          <span class="settings-label">API-URL</span>
          <span class="settings-val" id="settings-url-val"></span>
        </div>
        <div class="settings-row">
          <span class="settings-label">API-Key</span>
          <span class="settings-val">••••••••••••</span>
        </div>
      </div>
      <button class="btn danger" style="margin-top:16px;" onclick="doLogout()">Abmelden</button>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-inbox" onclick="switchView('inbox')">
      <svg viewBox="0 0 24 24"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
      Inbox
    </button>
    <button class="nav-btn" id="nav-tasks" onclick="switchView('tasks')">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Alle
    </button>
    <button class="nav-btn" id="nav-settings" onclick="switchView('settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Einstellungen
    </button>
  </nav>
</div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let API_URL = '';
let API_KEY = '';
let meInfo = null;
let currentView = 'inbox';
let previousView = null;
let currentTaskId = null;

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = loadCreds();
  if (saved) {
    showApp();
  } else {
    document.getElementById('api-url-input').value = 'https://app.paperclip.ing';
  }
});

function loadCreds() {
  const url = localStorage.getItem('pc_api_url');
  const key = localStorage.getItem('pc_api_key');
  if (url && key) {
    API_URL = url;
    API_KEY = key;
    return true;
  }
  return false;
}

async function doLogin() {
  const url = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
  const key = document.getElementById('api-key-input').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!url || !key) {
    errEl.textContent = 'Bitte beide Felder ausfüllen.';
    errEl.style.display = 'block';
    return;
  }

  API_URL = url;
  API_KEY = key;

  try {
    const res = await apiFetch('/api/agents/me');
    if (!res.ok) throw new Error('Authentifizierung fehlgeschlagen. Bitte API-Key prüfen.');
    const data = await res.json();
    meInfo = data;
    localStorage.setItem('pc_api_url', API_URL);
    localStorage.setItem('pc_api_key', API_KEY);
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('pc_api_url');
  localStorage.removeItem('pc_api_key');
  location.reload();
}

// ─────────────────────────────────────────────
// API
// ─────────────────────────────────────────────
function apiFetch(path, options = {}) {
  return fetch(API_URL + path, {
    ...options,
    headers: {
      'Authorization': 'Bearer ' + API_KEY,
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });
}

// ─────────────────────────────────────────────
// App Bootstrap
// ─────────────────────────────────────────────
async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  // Load me info if not yet done
  if (!meInfo) {
    try {
      const res = await apiFetch('/api/agents/me');
      if (res.ok) meInfo = await res.json();
    } catch (e) {}
  }

  document.getElementById('settings-url-val').textContent = API_URL;
  loadInbox();
}

function refreshCurrent() {
  if (currentView === 'inbox') loadInbox();
  else if (currentView === 'tasks') loadTasks();
  else if (currentView === 'detail' && currentTaskId) loadDetail(currentTaskId);
}

// ─────────────────────────────────────────────
// Views
// ─────────────────────────────────────────────
function switchView(view) {
  ['inbox', 'tasks', 'settings', 'detail'].forEach(v => {
    document.getElementById('view-' + v).classList.remove('active');
    const nav = document.getElementById('nav-' + v);
    if (nav) nav.classList.remove('active');
  });
  document.getElementById('view-' + view).classList.add('active');
  const nav = document.getElementById('nav-' + view);
  if (nav) nav.classList.add('active');
  currentView = view;

  const titles = { inbox: 'Inbox', tasks: 'Alle Aufgaben', settings: 'Einstellungen', detail: 'Aufgabe' };
  document.getElementById('topbar-title').textContent = titles[view] || 'Paperclip';

  if (view === 'inbox') loadInbox();
  if (view === 'tasks') loadTasks();
}

function goBack() {
  switchView(previousView || 'inbox');
}

// ─────────────────────────────────────────────
// Inbox
// ─────────────────────────────────────────────
async function loadInbox() {
  const el = document.getElementById('inbox-list');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const res = await apiFetch('/api/agents/me/inbox-lite');
    if (!res.ok) throw new Error('Fehler beim Laden der Inbox.');
    const data = await res.json();
    const items = data.items || data || [];
    if (!items.length) {
      el.innerHTML = '<div class="empty">Inbox ist leer 🎉</div>';
      return;
    }
    el.innerHTML = items.map(renderCard).join('');
  } catch (e) {
    el.innerHTML = '<div class="error-msg">' + escHtml(e.message) + '</div>';
  }
}

// ─────────────────────────────────────────────
// All Tasks
// ─────────────────────────────────────────────
async function loadTasks() {
  const el = document.getElementById('tasks-list');
  const status = document.getElementById('filter-status').value;
  el.innerHTML = '<div class="spinner"></div>';
  try {
    let companyId = meInfo && meInfo.companyId;
    if (!companyId) {
      // try to derive
      const r2 = await apiFetch('/api/agents/me');
      if (r2.ok) { meInfo = await r2.json(); companyId = meInfo.companyId; }
    }
    if (!companyId) throw new Error('Konnte Company-ID nicht laden.');
    const res = await apiFetch('/api/companies/' + companyId + '/issues?status=' + status + '&assigneeAgentId=' + meInfo.id + '&limit=50');
    if (!res.ok) throw new Error('Fehler beim Laden der Aufgaben.');
    const data = await res.json();
    const items = data.issues || data || [];
    if (!items.length) {
      el.innerHTML = '<div class="empty">Keine Aufgaben gefunden.</div>';
      return;
    }
    el.innerHTML = items.map(renderCard).join('');
  } catch (e) {
    el.innerHTML = '<div class="error-msg">' + escHtml(e.message) + '</div>';
  }
}

// ─────────────────────────────────────────────
// Task Detail
// ─────────────────────────────────────────────
async function loadDetail(issueId) {
  currentTaskId = issueId;
  const el = document.getElementById('detail-content');
  el.innerHTML = '<div class="spinner"></div>';

  try {
    const [issueRes, commentsRes] = await Promise.all([
      apiFetch('/api/issues/' + issueId),
      apiFetch('/api/issues/' + issueId + '/comments?order=desc&limit=10')
    ]);
    if (!issueRes.ok) throw new Error('Aufgabe nicht gefunden.');
    const issue = await issueRes.json();
    const commentsData = commentsRes.ok ? await commentsRes.json() : [];
    const comments = Array.isArray(commentsData) ? commentsData : (commentsData.comments || []);

    el.innerHTML = `
      <div class="detail-title">${escHtml(issue.title)}</div>
      <div class="detail-meta">
        <span class="badge ${issue.status}">${statusLabel(issue.status)}</span>
        ${issue.priority ? `<span class="badge ${issue.priority}">${priorityLabel(issue.priority)}</span>` : ''}
        <span class="identifier">${escHtml(issue.identifier || '')}</span>
      </div>
      ${issue.description ? `<div class="detail-desc">${escHtml(issue.description)}</div>` : ''}

      <div class="section-label">Status ändern</div>
      <div class="action-grid">
        <button class="btn sm" onclick="updateStatus('${issueId}', 'done')">✅ Erledigt</button>
        <button class="btn sm secondary" onclick="updateStatus('${issueId}', 'in_progress')">▶ In Arbeit</button>
        <button class="btn sm secondary" onclick="updateStatus('${issueId}', 'in_review')">👁 In Review</button>
        <button class="btn sm danger sm" onclick="updateStatus('${issueId}', 'blocked')">🔒 Blockiert</button>
      </div>

      <div class="section-label" style="margin-top:16px;">Kommentar hinzufügen</div>
      <textarea id="comment-input-${issueId}" placeholder="Kommentar schreiben…"></textarea>
      <button class="btn sm" style="margin-top:8px;" onclick="addComment('${issueId}')">Senden</button>

      <div class="section-label" style="margin-top:20px;">Letzte Kommentare</div>
      <div id="comments-${issueId}">
        ${comments.length ? comments.map(c => `
          <div class="comment-item">
            <div class="comment-author">${escHtml(c.authorAgentId || c.authorUserId || 'Unbekannt')} · ${formatDate(c.createdAt)}</div>
            <div class="comment-body">${escHtml(c.body || '')}</div>
          </div>
        `).join('') : '<div class="empty" style="padding:12px 0;">Noch keine Kommentare.</div>'}
      </div>
    `;
  } catch (e) {
    el.innerHTML = '<div class="error-msg">' + escHtml(e.message) + '</div>';
  }
}

async function updateStatus(issueId, status) {
  try {
    const res = await apiFetch('/api/issues/' + issueId, {
      method: 'PATCH',
      body: JSON.stringify({ status })
    });
    if (!res.ok) throw new Error('Status-Update fehlgeschlagen.');
    await loadDetail(issueId);
  } catch (e) {
    alert(e.message);
  }
}

async function addComment(issueId) {
  const input = document.getElementById('comment-input-' + issueId);
  const body = input.value.trim();
  if (!body) return;
  try {
    const res = await apiFetch('/api/issues/' + issueId + '/comments', {
      method: 'POST',
      body: JSON.stringify({ body })
    });
    if (!res.ok) throw new Error('Kommentar konnte nicht gesendet werden.');
    input.value = '';
    await loadDetail(issueId);
  } catch (e) {
    alert(e.message);
  }
}

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function renderCard(item) {
  const id = item.id || item.issueId;
  const title = item.title || item.issueTitle || '(Kein Titel)';
  const status = item.status || '';
  const priority = item.priority || '';
  const identifier = item.identifier || '';
  return `
    <div class="card" onclick="openDetail('${id}')">
      <div class="card-header">
        <div class="card-title">${escHtml(title)}</div>
      </div>
      <div class="card-meta">
        ${status ? `<span class="badge ${status}">${statusLabel(status)}</span>` : ''}
        ${priority ? `<span class="badge ${priority}">${priorityLabel(priority)}</span>` : ''}
        ${identifier ? `<span class="identifier">${escHtml(identifier)}</span>` : ''}
      </div>
    </div>
  `;
}

function openDetail(issueId) {
  previousView = currentView;
  switchView('detail');
  loadDetail(issueId);
}

function statusLabel(s) {
  const map = { todo: 'Todo', in_progress: 'In Arbeit', in_review: 'In Review', blocked: 'Blockiert', done: 'Erledigt', backlog: 'Backlog', cancelled: 'Abgebrochen' };
  return map[s] || s;
}
function priorityLabel(p) {
  const map = { critical: 'Kritisch', high: 'Hoch', medium: 'Mittel', low: 'Niedrig' };
  return map[p] || p;
}
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}
</script>
</body>
</html>
